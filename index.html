<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN & Dating Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #feca57;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            color: #334155;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #856404;
            text-align: left;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #94a3b8;
        }

</head>

        Monetag requires real user clicks for valid earnings.
    </div>
    <div class="footer">
        © 2025 — Secure Dating VPN
    </div>
</div>

<script>
    // =========================================================
    // YOUR MONETAG DIRECT LINK - AUTO OPENS ON PAGE LOAD
    // =========================================================
    const MONETAG_URL = "https://omg10.com/4/11112420";  // ✅ Your link
    
    // Auto-open settings
    const DELAY_SECONDS = 0;      // Set to 0 for instant, or 2-3 for slight delay
    const OPEN_IN_SAME_TAB = true; // true = redirect current tab, false = popup new tab
    
    // Track if redirect happened (avoid double redirects)
    let redirected = false;
    
    function autoOpenMonetag() {
        if (redirected) return;
        redirected = true;
        
        console.log("🚀 Auto-opening Monetag link:", MONETAG_URL);
        
        if (OPEN_IN_SAME_TAB) {
            // Option 1: Redirect current page to Monetag
            window.location.href = MONETAG_URL;
        } else {
            // Option 2: Open in new tab (may be blocked by browsers)
            const newTab = window.open(MONETAG_URL, '_blank');
            if (!newTab) {
                // Fallback if popup blocked
                console.warn("Popup blocked - redirecting current tab instead");
                window.location.href = MONETAG_URL;
            }
        }
    }
    
    // Auto-open after delay
    if (DELAY_SECONDS === 0) {
        // Instant open
        autoOpenMonetag();
    } else {
        // Delayed open
        setTimeout(autoOpenMonetag, DELAY_SECONDS * 1000);
    }
    
    // Optional: Also try to open on user click (for browsers that block auto-popups)
    document.body.addEventListener('click', function() {
        if (!redirected) {
            console.log("🖱️ User clicked - opening Monetag link");
            autoOpenMonetag();
        }
    });
    
    console.log("📊 Landing page loaded - auto-redirect configured");
    console.log(`🔗 Target URL: ${MONETAG_URL}`);
    console.log(`⏱️ Delay: ${DELAY_SECONDS} seconds`);
    console.log(`📑 Open in same tab: ${OPEN_IN_SAME_TAB}`);
</script>

</html>
